<!DOCTYPE html>
<html>
    <head>
        <title>Wordly</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id = "grid-container">

            <section id="introHero">
                <h1>Welcome to Wordly</h1>
                <p>Word searching made easy</p>
            </section>

            <main id="form-container">
                <form id="search-form">
                    <h3>Search for a word:</h3>

                    <label for="word-input" id="instruction">Enter word:</label>
                    <input type="text" id="word-input" name="enter-word" placeholder="write your word...">

                    <button id="search-button">Search</button>
                </form>
            </main>

            <article id="more-info">
                <section id="word-info">
                </section>
            </article>

            <footer id="footerId">
                <h3>Cecilia Grace Matini Nyanje</h3>
                <p>&copy; 2026. All rights reserved</p>
            </footer>

        </div>
        <script src="index.js"></script>
    </body>
</html>
